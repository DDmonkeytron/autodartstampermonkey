; ESP32-S3-DevKitC-1 N16R8  (16 MB flash / 8 MB OCTAL PSRAM)
; Darts scoreboard firmware — HUB75 64x64 panel + 2x WS2812 strips + HTTP API
;
; Build:  PlatformIO (VS Code)  ->  Build (checkmark)  ->  Upload (arrow)
; Flash over the ESP32-S3 UART USB-C port.

[env:esp32-s3-devkitc-1-n16r8]
platform  = espressif32 @ ^6.9.0   ; pin to 6.x (Arduino core 2.x — matches FastLED/HUB75-DMA support)
board     = esp32-s3-devkitc-1
framework = arduino

; --- N16R8 memory: QIO flash + OCTAL (OPI) PSRAM ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_upload.flash_size         = 16MB
board_build.partitions          = default_16MB.csv
board_build.filesystem          = littlefs

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.9
    https://github.com/mrcodetastic/ESP32-HUB75-MatrixPanel-DMA.git
    fastled/FastLED @ ^3.7.0
    bblanchon/ArduinoJson @ ^7.0.0
    bitbank2/AnimatedGIF @ ^2.1.0
    https://github.com/tzapu/WiFiManager.git
    links2004/WebSockets @ ^2.6.1     ; cloud remote: outbound WSS tunnel to the Cloudflare relay
